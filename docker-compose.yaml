services:
  app:
    build:
      context: .
      dockerfile: alvie-cli/Dockerfile
    
    hostname: alvie-cli

    volumes:
      - .:/home/alvie/alvie-cli

    working_dir: /home/alvie/alvie-cli
    stdin_open: true
    tty: true
    # activate venv
    command: /bin/bash --rcfile /home/alvie/venv/bin/activate
  viewer:
    build:
      context: .
      dockerfile: alvie-web/Dockerfile

    hostname: alvie-web

    ports:
      - "127.0.0.1:4242:80"

    # Make generated JSON files available to ?file=/parsed-output/<file>.json.
    volumes:
      - ./parsed-output:/usr/share/nginx/html/parsed-output:ro
